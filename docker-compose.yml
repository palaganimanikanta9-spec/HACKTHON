version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: smartsave-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: smartsave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartsave"]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr-server:
    build:
      context: ./mcp/ocr-server
    container_name: smartsave-ocr-server
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ai-server:
    build:
      context: ./mcp/ai-server
    container_name: smartsave-ai-server
    restart: always
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  wallet-server:
    build:
      context: ./mcp/wallet-server
    container_name: smartsave-wallet-server
    restart: always
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/smartsave?schema=public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build:
      context: ./server
    container_name: smartsave-express-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/smartsave?schema=public
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
    depends_on:
      db:
        condition: service_healthy
      ocr-server:
        condition: service_healthy
      ai-server:
        condition: service_healthy
      wallet-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
    container_name: smartsave-web-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_API_URL=http://server:5000/api/v1
    depends_on:
      - server

volumes:
  postgres_data:
